name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version-override:
        description: "Override auto-detected bump (patch/minor/major/x.y.z). Leave empty to auto-detect from commits."
        required: false
        type: string
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm test

  build-native:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node_arch: x64
            node_os: linux
          - os: macos-latest
            target: aarch64-apple-darwin
            node_arch: arm64
            node_os: darwin
          - os: macos-14
            target: x86_64-apple-darwin
            node_arch: x64
            node_os: darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            node_arch: x64
            node_os: win32

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/codegraph-core

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@3

      - name: Build native addon
        working-directory: crates/codegraph-core
        run: napi build --release --target ${{ matrix.target }}

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.node_os }}-${{ matrix.node_arch }}
          path: crates/codegraph-core/*.node
          if-no-files-found: error

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: npm install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          git checkout -- package-lock.json
          CURRENT=$(node -p "require('./package.json').version")

          if [ "${{ github.event_name }}" = "release" ]; then
            echo "Triggered by release event — using existing version $CURRENT"
          else
            OVERRIDE="${{ inputs.version-override }}"
            if [ -n "$OVERRIDE" ] && [ "$CURRENT" = "$OVERRIDE" ]; then
              echo "Version already at $OVERRIDE — skipping bump"
            elif [ -n "$OVERRIDE" ]; then
              npx commit-and-tag-version --release-as "$OVERRIDE"
            else
              npx commit-and-tag-version
            fi
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Verify the version was actually bumped (skip for release events and matching overrides)
          if [ "${{ github.event_name }}" != "release" ] && [ "$NEW_VERSION" = "$CURRENT" ] && [ "$CURRENT" != "$OVERRIDE" ]; then
            echo "::error::Version was not bumped (still $CURRENT). Check commit history or provide a version-override."
            exit 1
          fi

          echo "Will publish version $NEW_VERSION (was $CURRENT)"

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Verify version not already on npm
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          PKG="@optave/codegraph"
          echo "Checking if $PKG@$VERSION already exists on npm..."
          if npm view "$PKG@$VERSION" version 2>/dev/null; then
            echo "::error::$PKG@$VERSION is already published on npm. Bump to a higher version."
            exit 1
          fi
          echo "$PKG@$VERSION is not yet published — proceeding"

      - name: Publish platform packages
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"

          declare -A PACKAGES=(
            ["linux-x64"]="@optave/codegraph-linux-x64-gnu"
            ["darwin-arm64"]="@optave/codegraph-darwin-arm64"
            ["darwin-x64"]="@optave/codegraph-darwin-x64"
            ["win32-x64"]="@optave/codegraph-win32-x64-msvc"
          )

          for artifact_dir in artifacts/native-*/; do
            platform=$(basename "$artifact_dir" | sed 's/^native-//')
            pkg_name=${PACKAGES[$platform]}
            node_os=${platform%%-*}
            node_arch=${platform##*-}

            mkdir -p "pkg/$platform"
            cp "$artifact_dir"/*.node "pkg/$platform/codegraph-core.node"

            cat > "pkg/$platform/package.json" <<PKGJSON
          {
            "name": "${pkg_name}",
            "version": "${VERSION}",
            "description": "Native codegraph-core binary for ${node_os}-${node_arch}",
            "os": ["${node_os}"],
            "cpu": ["${node_arch}"],
            "main": "codegraph-core.node",
            "files": ["codegraph-core.node"],
            "license": "Apache-2.0",
            "repository": {
              "type": "git",
              "url": "https://github.com/optave/codegraph.git"
            }
          }
          PKGJSON

            echo "Publishing ${pkg_name}@${VERSION}"
            if [ "${{ inputs.dry-run }}" = "true" ]; then
              npm publish "./pkg/$platform" --access public --provenance --dry-run
            else
              npm publish "./pkg/$platform" --access public --provenance
            fi
          done

      - name: Publish main package (dry run)
        if: inputs.dry-run
        run: npm publish --access public --provenance --dry-run

      - name: Publish main package
        if: "!inputs.dry-run"
        run: npm publish --access public --provenance

      - name: Push version commit and tag
        if: github.event_name == 'workflow_dispatch' && !inputs.dry-run
        run: |
          git push origin main
          git push origin "v${{ steps.version.outputs.new_version }}"
