          mkdir -p "$PKG_DIR"
          cp "$NODE_FILE" "$PKG_DIR/codegraph-core.node"
          if [ ! -f "$PKG_DIR/package.json" ]; then
            echo '{"name":"@optave/codegraph-linux-x64-gnu","main":"codegraph-core.node"}' > "$PKG_DIR/package.json"
          fi
          echo "Installed native addon from Publish workflow run ${{ github.event.workflow_run.id }}"
          echo "  sha256: $(sha256sum "$PKG_DIR/codegraph-core.node" | cut -d' ' -f1)"

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-${{ hashFiles('src/embedder.js') }}
          restore-keys: hf-models-${{ runner.os }}-

      - name: Build graph
        run: node src/cli.js build .

      - name: Run embedding benchmark
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: node scripts/embedding-benchmark.js 2>/dev/null > embedding-benchmark-result.json

      - name: Update embedding report
        run: node scripts/update-embedding-report.js embedding-benchmark-result.json

      - name: Upload embedding result
        uses: actions/upload-artifact@v4
        with:
          name: embedding-benchmark-result
          path: embedding-benchmark-result.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet HEAD -- generated/EMBEDDING-BENCHMARKS.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from result
        id: version
        run: echo "version=$(node -p "require('./embedding-benchmark-result.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit and push via PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="benchmark/embedding-v${VERSION}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add generated/EMBEDDING-BENCHMARKS.md
          git commit -m "docs: update embedding benchmarks (v${VERSION})"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: update embedding benchmarks (v${VERSION})" \
            --body "Automated embedding benchmark update for **v${VERSION}** from workflow run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

