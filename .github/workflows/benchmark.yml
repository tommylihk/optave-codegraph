name: Benchmark

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
  workflow_dispatch:

permissions: {}

jobs:
  build-benchmark:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Download native addon from Publish
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: ${{ runner.temp }}/native-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Install native addon from Publish
        if: github.event_name == 'workflow_run'
        run: |
          ARTIFACT_DIR="${{ runner.temp }}/native-artifact"
          NODE_FILE="$ARTIFACT_DIR/codegraph-core.node"
          if [ ! -f "$NODE_FILE" ]; then
            echo "::error::Native addon not found at $NODE_FILE"
            ls -la "$ARTIFACT_DIR" || true
            exit 1
          fi
          PKG_DIR="node_modules/@optave/codegraph-linux-x64-gnu"
          mkdir -p "$PKG_DIR"
          cp "$NODE_FILE" "$PKG_DIR/codegraph-core.node"
          if [ ! -f "$PKG_DIR/package.json" ]; then
            echo '{"name":"@optave/codegraph-linux-x64-gnu","main":"codegraph-core.node"}' > "$PKG_DIR/package.json"
          fi
          echo "Installed native addon from Publish workflow run ${{ github.event.workflow_run.id }}"
          echo "  sha256: $(sha256sum "$PKG_DIR/codegraph-core.node" | cut -d' ' -f1)"

      - name: Run build benchmark
        run: node scripts/benchmark.js 2>/dev/null > benchmark-result.json

      - name: Update build report
        run: node scripts/update-benchmark-report.js benchmark-result.json

      - name: Upload build result
        uses: actions/upload-artifact@v4
        with:
          name: build-benchmark-result
          path: benchmark-result.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet HEAD -- generated/BUILD-BENCHMARKS.md README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from result
        id: version
        run: echo "version=$(node -p "require('./benchmark-result.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit and push via PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="benchmark/build-v${VERSION}-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add generated/BUILD-BENCHMARKS.md README.md
          git commit -m "docs: update build performance benchmarks (v${VERSION})"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: update build performance benchmarks (v${VERSION})" \
            --body "Automated build benchmark update for **v${VERSION}** from workflow run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

  embedding-benchmark:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
